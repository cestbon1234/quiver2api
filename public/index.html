<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiver2API</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --side: #f7f7f8;
      --panel: #ffffff;
      --text: #202123;
      --muted: #6b7280;
      --line: #e5e7eb;
      --soft: #f3f4f6;
      --soft-2: #eef2f7;
      --primary: #10a37f;
      --primary-strong: #0d8f6f;
      --ok: #0f8f68;
      --warn: #b7791f;
      --bad: #d93025;
      --code: #111827;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, textarea, select { font: inherit; letter-spacing: 0; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 390px;
      background: var(--bg);
    }
    .sidebar {
      height: 100vh;
      position: sticky;
      top: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 14px;
      background: var(--side);
      border-right: 1px solid var(--line);
      overflow: auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 4px 12px;
    }
    .mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #202123;
      color: #fff;
      font-weight: 700;
    }
    .brand strong { display: block; font-size: 15px; }
    .brand span { display: block; color: var(--muted); font-size: 12px; margin-top: 1px; }
    .nav { display: grid; gap: 6px; }
    .nav-link {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      border: 1px solid transparent;
    }
    .nav-link:hover, .nav-link.active {
      background: #fff;
      border-color: var(--line);
    }
    .side-block {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }
    .side-title {
      margin: 0 0 8px;
      color: #4b5563;
      font-size: 12px;
      font-weight: 650;
    }
    .status-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 11px;
      display: grid;
      gap: 8px;
    }
    .status-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .status-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--warn);
      flex: 0 0 auto;
    }
    .status-card.ready .dot { background: var(--ok); }
    .status-card.bad .dot { background: var(--bad); }
    .status-card strong { font-size: 13px; }
    .status-card span { color: var(--muted); font-size: 12px; }
    .field { display: grid; gap: 6px; margin-bottom: 10px; }
    .field label { color: #4b5563; font-size: 12px; }
    .input, .select, .textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 8px 10px;
    }
    .textarea {
      min-height: 92px;
      max-height: 210px;
      resize: vertical;
      border: 0;
      padding: 0;
      background: transparent;
      line-height: 1.55;
    }
    .input:focus, .select:focus, .textarea:focus {
      outline: 2px solid rgba(16, 163, 127, .16);
      border-color: var(--primary);
    }
    .textarea:focus { outline: none; }
    .btn {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { background: #f9fafb; }
    .btn.primary {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }
    .btn.primary:hover { background: var(--primary-strong); }
    .btn.small { min-height: 30px; padding: 5px 9px; font-size: 12px; }
    .btn.ghost { background: transparent; }
    .btn:disabled { opacity: .58; cursor: not-allowed; }
    .workspace {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: var(--bg);
    }
    .workspace-head {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--line);
    }
    .workspace-head h1 { margin: 0; font-size: 17px; }
    .workspace-head span { color: var(--muted); font-size: 12px; }
    .conversation {
      overflow: auto;
      padding: 28px 22px;
    }
    .thread {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      gap: 22px;
    }
    .message {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      background: var(--soft);
      color: #374151;
    }
    .message.user .avatar { background: #202123; color: #fff; }
    .bubble {
      min-width: 0;
      padding-top: 5px;
      color: #202123;
    }
    .bubble p { margin: 0 0 8px; }
    .message-meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .answer-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      display: grid;
      gap: 10px;
    }
    .composer-wrap {
      border-top: 1px solid var(--line);
      padding: 16px 22px 20px;
      background: #fff;
    }
    .composer {
      max-width: 820px;
      margin: 0 auto;
      border: 1px solid #d9d9e3;
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }
    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 10px;
      padding: 3px;
      border-radius: 8px;
      background: var(--soft);
    }
    .mode-tab {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: #374151;
      cursor: pointer;
      padding: 6px 8px;
      white-space: nowrap;
    }
    .mode-tab.active {
      background: #fff;
      border-color: var(--line);
      color: var(--text);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .image-row {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfbfc;
    }
    .image-row.visible { display: flex; }
    .image-preview {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }
    .thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: var(--soft-2);
      border: 1px solid var(--line);
      object-fit: cover;
      flex: 0 0 auto;
    }
    .file-meta {
      min-width: 0;
      display: grid;
      gap: 2px;
    }
    .file-meta strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 650;
    }
    .file-meta span { color: var(--muted); font-size: 12px; }
    .composer-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      margin-top: 10px;
      padding-top: 10px;
    }
    .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .muted { color: var(--muted); font-size: 12px; }
    .inspector {
      height: 100vh;
      position: sticky;
      top: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: #fbfbfc;
      border-left: 1px solid var(--line);
      overflow: hidden;
    }
    .inspector-head {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .inspector-head h2 { margin: 0; font-size: 15px; }
    .inspector-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .hidden { display: none !important; }
    .inspector-body {
      overflow: auto;
      padding: 16px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .empty {
      min-height: 260px;
      border: 1px dashed #d1d5db;
      border-radius: 8px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 20px;
      background: #fff;
    }
    .empty strong { color: #374151; }
    .results {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .result {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .preview {
      min-height: 240px;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(45deg, #f6f7f8 25%, transparent 25%),
        linear-gradient(-45deg, #f6f7f8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f6f7f8 75%),
        linear-gradient(-45deg, transparent 75%, #f6f7f8 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    }
    .preview svg {
      max-width: 100%;
      max-height: 300px;
      width: auto;
      height: auto;
      display: block;
    }
    .result-meta {
      border-top: 1px solid var(--line);
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .result-meta code {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #374151;
      font-size: 12px;
    }
    .json {
      display: none;
      white-space: pre-wrap;
      overflow: auto;
      max-height: 320px;
      background: var(--code);
      color: #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin: 0;
      font: 12px/1.55 Consolas, ui-monospace, monospace;
    }
    .toast {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 10;
      background: #202123;
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 14px 35px rgba(0,0,0,.18);
    }
    .hidden-input { display: none; }

    @media (max-width: 1180px) {
      .app { grid-template-columns: 250px minmax(0, 1fr); }
      .inspector {
        position: static;
        height: auto;
        min-height: 420px;
        grid-column: 2;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
    @media (max-width: 820px) {
      .app { display: block; }
      .sidebar, .inspector {
        position: static;
        height: auto;
        border: 0;
        border-bottom: 1px solid var(--line);
      }
      .workspace { min-height: auto; }
      .workspace-head { padding: 14px; align-items: flex-start; flex-direction: column; }
      .conversation { padding: 18px 14px; }
      .composer-wrap { padding: 12px 14px 16px; }
      .message { grid-template-columns: 30px minmax(0, 1fr); }
      .avatar { width: 30px; height: 30px; }
      .composer-tools, .image-row { align-items: stretch; flex-direction: column; }
      .toolbar { align-items: stretch; }
      .btn { width: 100%; }
      .mode-tabs { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">Q</div>
        <div>
          <strong>Quiver2API</strong>
          <span>Web credits to API</span>
        </div>
      </div>

      <nav class="nav">
        <a class="nav-link active" href="/"><span>SVG 生成</span><span>/</span></a>
        <a class="nav-link" href="/admin"><span>后台管理</span><span>/admin</span></a>
      </nav>

      <section class="side-block">
        <p class="side-title">状态</p>
        <div class="status-card" id="service-status">
          <div class="status-line">
            <div class="status-name">
              <span class="dot" aria-hidden="true"></span>
              <strong id="status-title">正在检查</strong>
            </div>
            <button class="btn small ghost" id="status-refresh" type="button">刷新</button>
          </div>
          <span id="status-message">请稍候...</span>
          <span id="status-credits">credits: 0</span>
        </div>
      </section>

      <section class="side-block">
        <p class="side-title">参数</p>
        <div class="field">
          <label for="model">模型</label>
          <select class="select" id="model">
            <option value="arrow-1.1">arrow-1.1</option>
            <option value="arrow-1.1-max">arrow-1.1-max</option>
            <option value="arrow-1">arrow-1</option>
          </select>
        </div>
        <div class="field" id="count-field">
          <label for="n">数量</label>
          <input class="input" id="n" type="number" min="1" max="4" value="1">
        </div>
        <div class="field">
          <label for="wait-ms">等待 SVG 毫秒</label>
          <input class="input" id="wait-ms" type="number" min="0" max="180000" value="90000">
        </div>
        <div class="field">
          <label for="api-key">本地 API Key</label>
          <input class="input" id="api-key" type="password" autocomplete="off" placeholder="未配置可留空">
        </div>
      </section>
    </aside>

    <main class="workspace">
      <header class="workspace-head">
        <div>
          <h1 id="page-title">SVG 生成</h1>
          <span id="endpoint-label">POST /v1/svgs/generations</span>
        </div>
        <div class="toolbar">
          <button class="btn small" id="sample-button" type="button">示例 Prompt</button>
          <button class="btn small" id="json-toggle" type="button">显示 JSON</button>
        </div>
      </header>

      <section class="conversation">
        <div class="thread" id="chat-log">
          <article class="message assistant">
            <div class="avatar">Q</div>
            <div class="bubble">
              <div class="message-meta">Quiver2API</div>
              <p>输入文本或上传参考图，我会调用已导入的 Quiver 网页额度生成 SVG，并在右侧显示结果。</p>
            </div>
          </article>
        </div>
      </section>

      <div class="composer-wrap">
        <form class="composer" id="generate-form">
          <div class="mode-tabs" role="tablist" aria-label="生成模式">
            <button class="mode-tab active" type="button" data-mode="text">文本生成</button>
            <button class="mode-tab" type="button" data-mode="reference">参考图生成</button>
            <button class="mode-tab" type="button" data-mode="vectorize">图片转 SVG</button>
          </div>

          <div class="image-row" id="image-row">
            <div class="image-preview" id="image-preview">
              <img class="thumb" id="image-thumb" alt="参考图预览">
              <div class="file-meta">
                <strong id="image-name">未选择图片</strong>
                <span id="image-size">选择 PNG、JPG、WebP 或 SVG</span>
              </div>
            </div>
            <div class="toolbar">
              <button class="btn small" id="pick-image" type="button">选择图片</button>
              <button class="btn small ghost" id="clear-image" type="button">移除</button>
            </div>
          </div>
          <input class="hidden-input" id="image-file" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml">

          <textarea class="textarea" id="prompt" required placeholder="例如：A clean SVG icon of a paper airplane, simple geometric style"></textarea>
          <div class="composer-tools">
            <span class="muted" id="mode-hint">生成会消耗可用 Quiver 网页额度</span>
            <button class="btn primary" id="generate-button" type="submit">生成 SVG</button>
          </div>
        </form>
      </div>
    </main>

    <aside class="inspector">
      <div class="inspector-head">
        <h2>结果预览</h2>
        <div class="inspector-actions">
          <button class="btn small hidden" id="refresh-result" type="button">刷新结果</button>
          <span class="muted" id="result-summary">等待生成</span>
        </div>
      </div>
      <div class="inspector-body">
        <div class="empty" id="empty-state">
          <div>
            <strong>生成后会在这里显示 SVG</strong>
            <div>可以复制源码或下载 .svg 文件</div>
          </div>
        </div>
        <div class="results" id="results"></div>
        <pre class="json" id="raw-json"></pre>
      </div>
    </aside>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
      image: null,
      lastResponse: null,
      mode: 'text',
      pendingBubble: null,
      refreshTimer: null,
      refreshing: false
    };
    const modeMeta = {
      text: {
        button: '生成 SVG',
        endpoint: 'POST /v1/svgs/generations',
        hint: '生成会消耗可用 Quiver 网页额度',
        placeholder: '例如：A clean SVG icon of a paper airplane, simple geometric style',
        title: 'SVG 生成',
        waitMs: 90000
      },
      reference: {
        button: '参考图生成',
        endpoint: 'POST /v1/svgs/generations',
        hint: '会先把参考图上传到 Quiver，再消耗网页额度生成',
        placeholder: '描述你希望参考图如何被改造成 SVG，例如：keep the shape, use a flat two-color logo style',
        title: '参考图生成',
        waitMs: 90000
      },
      vectorize: {
        button: '图片转 SVG',
        endpoint: 'POST /v1/svgs/vectorizations',
        hint: '使用 Quiver 网页端 Vectorize 模式',
        placeholder: '图片转 SVG 不需要 prompt；可留空',
        title: '图片转 SVG',
        waitMs: 180000
      }
    };

    function toast(message) {
      const item = document.createElement('div');
      item.className = 'toast';
      item.textContent = message;
      document.body.appendChild(item);
      setTimeout(() => item.remove(), 2600);
    }

    function apiHeaders() {
      const key = $('api-key').value.trim() || localStorage.getItem('quiver2api:localApiKey') || '';
      if (key) localStorage.setItem('quiver2api:localApiKey', key);
      return {
        'Content-Type': 'application/json',
        ...(key ? { Authorization: `Bearer ${key}` } : {})
      };
    }

    async function jsonFetch(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        const message = data.error?.message || data.error || `HTTP ${response.status}`;
        throw new Error(message);
      }
      return data;
    }

    function addMessage(role, text) {
      const article = document.createElement('article');
      article.className = `message ${role}`;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '你' : 'Q';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = role === 'user' ? '你' : 'Quiver2API';
      const paragraph = document.createElement('p');
      paragraph.textContent = text;
      bubble.appendChild(meta);
      bubble.appendChild(paragraph);
      article.appendChild(avatar);
      article.appendChild(bubble);
      $('chat-log').appendChild(article);
      article.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return bubble;
    }

    async function refreshStatus(force = false) {
      const statusBox = $('service-status');
      const title = $('status-title');
      const message = $('status-message');
      try {
        const data = await jsonFetch(`/v1/status${force ? '?refresh=true' : ''}`, {
          headers: apiHeaders()
        });
        statusBox.className = `status-card ${data.ready ? 'ready' : ''}`;
        title.textContent = data.ready ? `${data.active_accounts} 个账号可用` : '暂不可生成';
        message.textContent = data.ready
          ? '已导入的网页账号可以调用生成接口。'
          : data.session_accounts
            ? '已有网页账号，但当前没有可用 Create 额度或权限。'
            : '还没有导入可用的 Quiver 网页账号。';
        $('status-credits').textContent = `credits: ${data.total_credits || 0}`;
      } catch (error) {
        statusBox.className = 'status-card bad';
        title.textContent = '状态检查失败';
        message.textContent = error.message;
        $('status-credits').textContent = 'credits: ?';
      }
    }

    function sanitizeSvg(svg) {
      const template = document.createElement('template');
      template.innerHTML = String(svg || '').trim();
      const element = template.content.querySelector('svg');
      if (!element) return null;
      element.querySelectorAll('script, iframe, object, embed').forEach((node) => node.remove());
      [...element.attributes].forEach((attr) => {
        if (/^on/i.test(attr.name)) element.removeAttribute(attr.name);
      });
      element.querySelectorAll('*').forEach((node) => {
        [...node.attributes].forEach((attr) => {
          if (/^on/i.test(attr.name)) node.removeAttribute(attr.name);
        });
      });
      return element;
    }

    function downloadSvg(svg, name) {
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = name;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function copyText(text) {
      await navigator.clipboard.writeText(text);
      toast('已复制 SVG');
    }

    function formatBytes(bytes) {
      const value = Number(bytes || 0);
      if (value < 1024) return `${value} B`;
      if (value < 1024 * 1024) return `${(value / 1024).toFixed(1)} KB`;
      return `${(value / 1024 / 1024).toFixed(2)} MB`;
    }

    function renderImageState() {
      if (!state.image) {
        $('image-thumb').removeAttribute('src');
        $('image-name').textContent = '未选择图片';
        $('image-size').textContent = '选择 PNG、JPG、WebP 或 SVG';
        return;
      }
      $('image-thumb').src = state.image.dataUrl;
      $('image-name').textContent = state.image.filename;
      $('image-size').textContent = `${state.image.mimeType || 'image'} / ${formatBytes(state.image.size)}`;
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('读取图片失败'));
        reader.readAsDataURL(file);
      });
    }

    async function pickImage(file) {
      if (!file) return;
      if (!/^image\//i.test(file.type || '')) {
        toast('请选择图片文件');
        return;
      }
      const dataUrl = await readFileAsDataUrl(file);
      const base64 = dataUrl.replace(/^data:[^,]+,/, '');
      state.image = {
        base64,
        dataUrl,
        filename: file.name || 'reference.png',
        mimeType: file.type || 'image/png',
        size: file.size
      };
      renderImageState();
    }

    function setMode(mode) {
      state.mode = mode;
      const meta = modeMeta[mode];
      document.querySelectorAll('.mode-tab').forEach((button) => {
        button.classList.toggle('active', button.dataset.mode === mode);
      });
      $('page-title').textContent = meta.title;
      $('endpoint-label').textContent = meta.endpoint;
      $('mode-hint').textContent = meta.hint;
      $('generate-button').textContent = meta.button;
      $('prompt').placeholder = meta.placeholder;
      $('prompt').required = mode !== 'vectorize';
      $('wait-ms').value = String(meta.waitMs);
      $('image-row').classList.toggle('visible', mode !== 'text');
      $('count-field').style.display = mode === 'vectorize' ? 'none' : 'grid';
    }

    function renderAssistantSummary(response, outputs, readyCount) {
      const bubble = state.pendingBubble || addMessage('assistant', '');
      bubble.innerHTML = '';
      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = 'Quiver2API';
      const box = document.createElement('div');
      box.className = 'answer-box';
      const title = document.createElement('strong');
      title.textContent = `${response.status || 'unknown'} / ${readyCount}/${outputs.length} ready`;
      const detail = document.createElement('span');
      detail.className = 'muted';
      detail.textContent = response.account?.email
        ? `使用账号 ${response.account.email}，剩余额度 ${response.usage?.credits_remaining ?? response.account.credits ?? 0}`
        : '结果已返回';
      box.appendChild(title);
      box.appendChild(detail);
      bubble.appendChild(meta);
      bubble.appendChild(box);
      state.pendingBubble = null;
    }

    function clearResultRefreshTimer() {
      if (state.refreshTimer) {
        clearTimeout(state.refreshTimer);
        state.refreshTimer = null;
      }
    }

    function pendingCount(outputs) {
      return outputs.filter((item) => !item.svg && !['failed', 'error', 'cancelled', 'canceled'].includes(String(item.status || '').toLowerCase())).length;
    }

    function canRefreshResult(response, outputs) {
      if (!response?.account?.email) return false;
      const taskIds = Array.isArray(response.task_ids) ? response.task_ids : [];
      const creationIds = Array.isArray(response.creation_ids) ? response.creation_ids : [];
      return pendingCount(outputs) > 0 && (taskIds.length > 0 || creationIds.length > 0);
    }

    function refreshBodyFromResponse(response, manual = false) {
      return {
        object: response.object,
        email: response.account?.email,
        model: response.model,
        task_ids: response.task_ids || [],
        creation_ids: response.creation_ids || [],
        wait_ms: manual ? 45000 : 30000,
        poll_interval_ms: 2500
      };
    }

    function updateRefreshControls(response, outputs) {
      const button = $('refresh-result');
      clearResultRefreshTimer();

      if (!canRefreshResult(response, outputs)) {
        button.classList.add('hidden');
        button.disabled = true;
        button.textContent = '刷新结果';
        return;
      }

      button.classList.remove('hidden');
      button.disabled = state.refreshing;
      button.textContent = state.refreshing ? '刷新中...' : '刷新结果';

      state.refreshTimer = setTimeout(() => {
        refreshExistingResult(false).catch((error) => toast(error.message));
      }, 10000);
    }

    function renderResults(response) {
      state.lastResponse = response;
      $('raw-json').textContent = JSON.stringify(response, null, 2);
      const container = $('results');
      container.innerHTML = '';
      const outputs = Array.isArray(response.data) ? response.data : [];
      const ready = outputs.filter((item) => item.svg);
      $('empty-state').style.display = ready.length ? 'none' : 'grid';
      $('result-summary').textContent = `${response.status || 'unknown'} / ${ready.length}/${outputs.length} ready`;
      renderAssistantSummary(response, outputs, ready.length);
      updateRefreshControls(response, outputs);

      outputs.forEach((item, index) => {
        const card = document.createElement('article');
        card.className = 'result';
        const preview = document.createElement('div');
        preview.className = 'preview';
        if (item.svg) {
          const svg = sanitizeSvg(item.svg);
          preview.appendChild(svg || document.createTextNode('SVG 无法预览'));
        } else {
          preview.innerHTML = `<span class="muted">${item.error || item.status || 'pending'}</span>`;
        }

        const meta = document.createElement('div');
        meta.className = 'result-meta';
        meta.innerHTML = `
          <code>${item.creation_id || item.id || `output-${index + 1}`}</code>
          <div class="toolbar">
            <button class="btn small" type="button" data-copy="${index}" ${item.svg ? '' : 'disabled'}>复制</button>
            <button class="btn small" type="button" data-download="${index}" ${item.svg ? '' : 'disabled'}>下载</button>
          </div>
        `;

        card.appendChild(preview);
        card.appendChild(meta);
        container.appendChild(card);
      });

      container.querySelectorAll('[data-copy]').forEach((button) => {
        button.addEventListener('click', () => {
          const item = outputs[Number(button.dataset.copy)];
          if (item?.svg) copyText(item.svg).catch((error) => toast(error.message));
        });
      });
      container.querySelectorAll('[data-download]').forEach((button) => {
        button.addEventListener('click', () => {
          const item = outputs[Number(button.dataset.download)];
          if (item?.svg) downloadSvg(item.svg, `${item.creation_id || `quiver-${Date.now()}`}.svg`);
        });
      });
    }

    async function refreshExistingResult(manual = true) {
      if (!state.lastResponse || state.refreshing) return;
      const outputs = Array.isArray(state.lastResponse.data) ? state.lastResponse.data : [];
      if (!canRefreshResult(state.lastResponse, outputs)) return;

      const button = $('refresh-result');
      clearResultRefreshTimer();
      state.refreshing = true;
      button.disabled = true;
      button.textContent = '刷新中...';

      try {
        const response = await jsonFetch('/v1/svgs/results', {
          method: 'POST',
          headers: apiHeaders(),
          body: JSON.stringify(refreshBodyFromResponse(state.lastResponse, manual))
        });
        renderResults(response);
        await refreshStatus();
      } finally {
        state.refreshing = false;
        const latestOutputs = Array.isArray(state.lastResponse?.data) ? state.lastResponse.data : [];
        updateRefreshControls(state.lastResponse, latestOutputs);
      }
    }

    function requestBodyForMode() {
      const prompt = $('prompt').value.trim();
      const waitMs = Number($('wait-ms').value || modeMeta[state.mode]?.waitMs || 90000);
      const common = {
        model: $('model').value,
        wait_ms: waitMs
      };

      if (state.mode === 'text') {
        if (!prompt) throw new Error('请输入 prompt');
        return {
          endpoint: '/v1/svgs/generations',
          summary: prompt,
          body: {
            ...common,
            prompt,
            n: Number($('n').value || 1)
          }
        };
      }

      if (!state.image) throw new Error('请先选择参考图片');
      const image = {
        base64: state.image.base64,
        filename: state.image.filename,
        mime_type: state.image.mimeType
      };

      if (state.mode === 'reference') {
        if (!prompt) throw new Error('请输入 prompt');
        return {
          endpoint: '/v1/svgs/generations',
          summary: `${prompt}\n[参考图: ${state.image.filename}]`,
          body: {
            ...common,
            prompt,
            n: Number($('n').value || 1),
            references: [image]
          }
        };
      }

      return {
        endpoint: '/v1/svgs/vectorizations',
        summary: `图片转 SVG: ${state.image.filename}`,
        body: {
          ...common,
          auto_crop: true,
          image
        }
      };
    }

    async function generate(event) {
      event.preventDefault();
      const button = $('generate-button');
      let request;
      try {
        request = requestBodyForMode();
      } catch (error) {
        toast(error.message);
        return;
      }

      addMessage('user', request.summary);
      state.pendingBubble = addMessage('assistant', '正在调用 Quiver...');
      button.disabled = true;
      button.textContent = '处理中...';
      try {
        const response = await jsonFetch(request.endpoint, {
          method: 'POST',
          headers: apiHeaders(),
          body: JSON.stringify(request.body)
        });
        renderResults(response);
        await refreshStatus();
      } catch (error) {
        toast(error.message);
        $('result-summary').textContent = '生成失败';
        if (state.pendingBubble) {
          state.pendingBubble.innerHTML = '';
          const meta = document.createElement('div');
          meta.className = 'message-meta';
          meta.textContent = 'Quiver2API';
          const paragraph = document.createElement('p');
          paragraph.textContent = error.message;
          state.pendingBubble.appendChild(meta);
          state.pendingBubble.appendChild(paragraph);
          state.pendingBubble = null;
        }
      } finally {
        button.disabled = false;
        button.textContent = modeMeta[state.mode].button;
      }
    }

    $('generate-form').addEventListener('submit', generate);
    $('status-refresh').addEventListener('click', () => refreshStatus(true));
    $('refresh-result').addEventListener('click', () => {
      refreshExistingResult(true).catch((error) => toast(error.message));
    });
    $('pick-image').addEventListener('click', () => $('image-file').click());
    $('clear-image').addEventListener('click', () => {
      state.image = null;
      $('image-file').value = '';
      renderImageState();
    });
    $('image-file').addEventListener('change', (event) => {
      pickImage(event.target.files?.[0]).catch((error) => toast(error.message));
    });
    document.querySelectorAll('.mode-tab').forEach((button) => {
      button.addEventListener('click', () => setMode(button.dataset.mode));
    });
    $('sample-button').addEventListener('click', () => {
      if (state.mode === 'reference') {
        $('prompt').value = 'Turn the reference into a clean flat SVG logo, preserve the silhouette, use balanced whitespace';
      } else if (state.mode === 'vectorize') {
        $('prompt').value = '';
      } else {
        $('prompt').value = 'A clean SVG icon of a paper airplane over a small map pin, simple geometric style, balanced whitespace';
      }
      $('prompt').focus();
    });
    $('json-toggle').addEventListener('click', () => {
      const box = $('raw-json');
      box.style.display = box.style.display === 'block' ? 'none' : 'block';
      $('json-toggle').textContent = box.style.display === 'block' ? '隐藏 JSON' : '显示 JSON';
    });

    $('api-key').value = localStorage.getItem('quiver2api:localApiKey') || '';
    setMode('text');
    renderImageState();
    refreshStatus();
  </script>
</body>
</html>
